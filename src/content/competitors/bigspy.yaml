strengths:
  - Broadest platform coverage — Facebook, Instagram, TikTok, YouTube, Twitter, Pinterest, Yahoo
  - Genuine free tier for first-time researchers
  - Lowest paid entry point at $9/month (as of April 2026)
  - Generalist visibility suits agencies serving multiple client types
  - Cross-platform creative discovery — useful for brand-side research

weaknesses:
  - Shallow depth on any single platform compared to specialists
  - No affiliate-network classification (no ClickBank / Digistore / BuyGoods detection)
  - No landing page capture or archive
  - No creative grouping across advertisers
  - Mixed data-quality reports in affiliate marketing communities
  - No dedicated offer intelligence

bestFor:
  - First-time ad researchers evaluating tools on the free tier
  - Generalist agencies serving cross-vertical clients
  - Budget-constrained solopreneurs on the $9 Basic plan
  - Teams needing quick cross-platform visibility rather than single-platform depth

notFor:
  - Serious Meta-focused affiliate operators who need research depth
  - CPA affiliates running ClickBank or Digistore offers who need network classification
  - Teams needing landing page archives for teardown
  - Anyone building a workflow around 120+ days running profitability signals

standoutFeature: >-
  The broadest free tier on the market, covering Facebook, Instagram, TikTok,
  YouTube, Twitter, and Pinterest — useful for first-timers sampling the category.

