strengths:
  - Modern, collaborative UI — arguably the best in the category
  - Swipe files, folders, tags, and brief builder for agency workflows
  - Strong TikTok coverage alongside Meta
  - Designed for creative strategists working across multiple clients
  - Design-tool integrations and client-ready exports

weaknesses:
  - Smaller database than AdSpy or BigSpy
  - No affiliate-network classification (not the target audience)
  - No offer intelligence
  - No landing page ripper or archive
  - Inspiration workflow, not deep-research workflow
  - Higher tier pricing escalates for larger agency teams

bestFor:
  - Creative agencies building client swipe files
  - Brand-side creative strategists running mood boards
  - DTC brands researching their competitors' ad creative
  - Teams collaborating on ad brief development

notFor:
  - CPA or ClickBank affiliates doing offer-driven research
  - Solo operators on a tight tool budget
  - Researchers who need landing page archives
  - Teams running Meta-only affiliate offers (AdRecon fits better)

standoutFeature: >-
  Modern agency-friendly workflow — swipe files, briefs, tags, and
  design-tool integrations in a best-in-class UI.

