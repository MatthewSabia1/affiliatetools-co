strengths:
  - Deepest TikTok Ads Library coverage
  - TikTok Shop product research integration
  - Short-form creative analysis (hooks, retention points)
  - Trend-feed format matches how TikTok affiliates actually research
  - Strong for TikTok Shop sellers

weaknesses:
  - TikTok-only — no Meta, YouTube, or Google coverage
  - No affiliate-network classification (no ClickBank / Digistore)
  - No landing page archive download
  - Narrow use case — not useful for non-TikTok campaigns
  - No cross-advertiser creative grouping like AdRecon's Proven Creatives
  - Higher entry price than generalist tools like BigSpy

bestFor:
  - TikTok-first affiliates
  - TikTok Shop sellers
  - Short-form creative researchers
  - Dropshippers focused on TikTok as a channel

notFor:
  - Meta-focused marketers (use AdRecon or AdSpy instead)
  - CPA affiliates running non-TikTok offers
  - Multi-platform agencies (use BigSpy or PowerAdSpy)
  - Teams needing landing page archives or affiliate-network intelligence

standoutFeature: >-
  The only ad spy tool with first-class TikTok Ads Library + TikTok Shop
  integration — a specialist competitors can't match on TikTok depth.

